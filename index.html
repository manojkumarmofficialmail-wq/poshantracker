<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poshan Abhiyaan Kerala — Poshan Tracker Report Analysis · June 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#13232b;--ink-soft:#46606b;--ink-faint:#7d949d;
  --paper:#f6f2e9;--paper-2:#fffdf8;--card:#ffffff;
  --line:#e3dccd;--line-soft:#eee8db;
  --teal:#0d6e6e;--teal-deep:#0a4f50;--teal-wash:#e2efed;
  --saffron:#e08a1e;--saffron-soft:#f6dcb0;
  --maroon:#9e2b2b;--green:#3f8f5a;--amber:#c98a16;
  --shadow:0 1px 2px rgba(19,35,43,.05),0 8px 24px -12px rgba(19,35,43,.18);
  --shadow-lg:0 2px 8px rgba(19,35,43,.06),0 24px 50px -22px rgba(19,35,43,.26);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(circle at 12% 6%,rgba(13,110,110,.045),transparent 38%),radial-gradient(circle at 90% 0,rgba(224,138,30,.05),transparent 30%)}
.mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
.serif{font-family:'Fraunces',serif}
.wrap{max-width:1240px;margin:0 auto;padding:0 22px}
@media(max-width:600px){.wrap{padding:0 14px}}

/* header */
header.mast{background:linear-gradient(135deg,#0d6e6e,#0a4f50 60%,#13414f);color:#fff;position:relative;overflow:hidden;border-bottom:3px solid var(--saffron)}
header.mast::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.03) 0 2px,transparent 2px 22px);pointer-events:none}
.mast-in{padding:20px 0 22px;position:relative;z-index:2}
.logos{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.logos .lbox{background:#fff;border-radius:12px;padding:7px 11px;display:flex;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.logos .lbox img{display:block;height:42px;width:auto}
.logos .lbox.wcd img{height:46px}
.logos .govt{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:600;line-height:1.5}
.logos .govt b{color:#fff;display:block;font-size:12.5px;letter-spacing:.06em}
h1.title{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(23px,4.6vw,42px);line-height:1.07;letter-spacing:-.01em;max-width:22ch}
h1.title .hl{color:var(--saffron-soft);font-style:italic}
.subline{margin-top:13px;display:flex;flex-wrap:wrap;gap:7px 8px;font-size:12px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);font-weight:500;color:rgba(255,255,255,.92)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--saffron);box-shadow:0 0 0 3px rgba(224,138,30,.25)}

/* nav tabs - distinct colors */
nav.tabs{position:sticky;top:0;z-index:40;background:rgba(246,242,233,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.tabs-in{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:9px 0}
.tabs-in::-webkit-scrollbar{display:none}
.tab{flex:none;border:1.5px solid var(--line);background:var(--card);cursor:pointer;font-family:'Inter';font-size:12.5px;font-weight:600;color:var(--ink-soft);
  padding:8px 14px;border-radius:100px;white-space:nowrap;transition:all .16s;display:flex;align-items:center;gap:7px}
.tab .tn{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.6}
.tab:hover{border-color:var(--teal);color:var(--teal);transform:translateY(-1px)}
.tab.active{color:#fff;border-color:transparent}
.tab[data-c="home"].active{background:linear-gradient(135deg,#0d6e6e,#0a4f50)}
.tab[data-c="awc"].active{background:linear-gradient(135deg,#9e2b2b,#7a1f1f)}
.tab[data-c="hv"].active{background:linear-gradient(135deg,#2c7da0,#1f5f7a)}
.tab[data-c="thr"].active{background:linear-gradient(135deg,#c98a16,#9c6a0e)}
.tab[data-c="apaar"].active{background:linear-gradient(135deg,#7048a8,#553584)}
.tab[data-c="s1"].active,.tab[data-c="s2"].active,.tab[data-c="s3"].active,.tab[data-c="s4"].active,.tab[data-c="s5"].active{background:linear-gradient(135deg,#3f8f5a,#2c6b41)}

main{padding:30px 0 70px}
.panel{display:none;animation:fade .35s ease}
.panel.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:9px}
.eyebrow::before{content:"";width:20px;height:1.5px;background:var(--saffron)}
h2.sec{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(22px,3.6vw,33px);line-height:1.1;letter-spacing:-.01em;max-width:26ch}
.sec-lead{margin-top:10px;font-size:14.5px;color:var(--ink-soft);max-width:64ch}

/* hero stat tiles */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:22px 0}
@media(max-width:880px){.tiles{grid-template-columns:repeat(2,1fr)}}
@media(max-width:440px){.tiles{grid-template-columns:1fr 1fr;gap:9px}}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.tile .tk{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
.tile .tv{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1;margin-top:8px;letter-spacing:-.02em}
.tile .tv small{font-size:14px;color:var(--ink-faint)}
.tile .ts{font-size:11.5px;color:var(--ink-soft);margin-top:6px}
.tile.t-teal .tv{color:var(--teal)}.tile.t-red .tv{color:var(--maroon)}.tile.t-amber .tv{color:var(--amber)}.tile.t-green .tv{color:var(--green)}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.tile.t-teal::before{background:var(--teal)}.tile.t-red::before{background:var(--maroon)}.tile.t-amber::before{background:var(--amber)}.tile.t-green::before{background:var(--green)}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.card.pad{padding:20px}
@media(max-width:600px){.card.pad{padding:15px}}
.card-h{font-size:13px;font-weight:700;color:var(--ink);display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:3px;flex-wrap:wrap}
.card-h .meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);font-weight:500}
.card-sub{font-size:12px;color:var(--ink-soft);margin-bottom:15px}

/* home: 8 component cards grid */
.comp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:8px 0 6px}
@media(max-width:760px){.comp-grid{grid-template-columns:1fr}}
.comp{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:17px 18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s;border-top:3px solid var(--teal)}
.comp:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.comp.c-awc{border-top-color:var(--maroon)}.comp.c-hv{border-top-color:#2c7da0}.comp.c-thr{border-top-color:var(--amber)}.comp.c-apaar{border-top-color:#7048a8}
.comp.c-snp{border-top-color:var(--green)}
.comp .ch{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.comp .cn{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.25}
.comp .cpct{font-family:'Fraunces',serif;font-weight:600;font-size:27px;line-height:1;letter-spacing:-.02em;white-space:nowrap}
.comp .cd{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.45}
.comp .cbar{height:7px;background:#ece5d6;border-radius:5px;overflow:hidden;margin-top:13px}
.comp .cbar i{display:block;height:100%;border-radius:5px;transition:width .9s cubic-bezier(.2,.7,.2,1)}
.comp .crow{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-faint);margin-top:8px}
.comp .crow b{color:var(--green);font-weight:600}.comp .crow .lo{color:var(--maroon)}
.comp .gohint{font-size:10.5px;color:var(--teal);font-weight:600;margin-top:11px;display:flex;align-items:center;gap:5px}

/* ranked leaderboard */
.rank-list{display:flex;flex-direction:column;gap:1px}
.rank-row{display:grid;grid-template-columns:26px 1fr auto;gap:11px;align-items:center;padding:8px 8px;border-radius:8px;transition:background .15s}
.rank-row:hover{background:var(--paper)}
.rank-row .pos{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-faint);font-weight:600;text-align:right}
.rank-row.top .pos{color:var(--green)}.rank-row.bottom .pos{color:var(--maroon)}
.rank-row .nm{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:9px;min-width:0}
.rank-row .label{flex:none;width:115px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(max-width:520px){.rank-row .label{width:90px;font-size:12px}.rank-row{gap:8px}}
.rank-row .barwrap{flex:1;height:10px;background:#ece5d6;border-radius:6px;overflow:hidden;min-width:30px;box-shadow:inset 0 1px 2px rgba(19,35,43,.06)}
.rank-row .bar{height:100%;border-radius:6px;background:var(--teal);transition:width .9s cubic-bezier(.2,.7,.2,1)}
.rank-row.top .bar{background:linear-gradient(90deg,var(--green),#5aa876)}
.rank-row.bottom .bar{background:linear-gradient(90deg,var(--maroon),#c45151)}
.rank-row .val{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;min-width:50px;text-align:right}

/* podium */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:6px 0 8px}
@media(max-width:640px){.podium{grid-template-columns:1fr}}
.pod{border-radius:15px;padding:18px;color:#fff;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.pod.g1{background:linear-gradient(150deg,#0d6e6e,#0a4f50)}
.pod.g2{background:linear-gradient(150deg,#2c7d72,#1c5d58)}
.pod.g3{background:linear-gradient(150deg,#4a8a78,#356a5c)}
.pod .medal{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;font-weight:600}
.pod .dist{font-family:'Fraunces',serif;font-weight:600;font-size:25px;margin-top:5px;line-height:1}
.pod .score{font-size:11.5px;opacity:.92;margin-top:9px}
.pod::after{content:"";position:absolute;right:-28px;bottom:-28px;width:110px;height:110px;border-radius:50%;border:16px solid rgba(255,255,255,.06)}

/* table */
.tablewrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:var(--card);overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;min-width:540px}
thead th{background:var(--teal-deep);color:#fff;font-size:10.5px;letter-spacing:.03em;text-transform:uppercase;font-weight:600;text-align:right;padding:12px 13px;white-space:nowrap;cursor:pointer;user-select:none}
thead th:first-child{text-align:left}
thead th:hover{background:var(--teal)}
tbody td{padding:10px 13px;font-size:12.5px;text-align:right;border-bottom:1px solid var(--line-soft);font-family:'IBM Plex Mono',monospace;color:var(--ink-soft)}
tbody td:first-child{text-align:left;font-family:'Inter';font-weight:600;color:var(--ink)}
tbody tr:hover{background:var(--paper)}
tbody tr.tot td{background:var(--teal-wash);font-weight:700;color:var(--teal-deep);border-top:2px solid var(--teal)}
.pin{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.hi{color:var(--green)!important}.lo{color:var(--maroon)!important}.mid{color:var(--amber)!important}

.insights{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:20px 0}
@media(max-width:760px){.insights{grid-template-columns:1fr}}
.ins{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:11px;padding:15px 16px;box-shadow:var(--shadow)}
.ins.good{border-left-color:var(--green)}.ins.bad{border-left-color:var(--maroon)}
.ins .it{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--ink-faint);margin-bottom:6px}
.ins .ib{font-size:13px;color:var(--ink);line-height:1.5}
.ins .ib b{color:var(--teal-deep)}.ins.bad .ib b{color:var(--maroon)}.ins.good .ib b{color:var(--green)}

.split{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px;align-items:start}
@media(max-width:860px){.split{grid-template-columns:1fr}}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--ink-soft);margin-top:12px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}

/* alert banner for AWC closed */
.alert{background:linear-gradient(135deg,#fbeaea,#f7dede);border:1px solid #e8b4b4;border-left:4px solid var(--maroon);border-radius:13px;padding:16px 18px;margin:20px 0}
.alert .at{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--maroon);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.alert .ab{font-size:13.5px;color:var(--ink);line-height:1.55}
.alert .ab b{color:var(--maroon)}
.closed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:9px;margin-top:13px}
.closed-card{background:#fff;border:1px solid #e8b4b4;border-radius:10px;padding:11px 13px}
.closed-card .cd-d{font-size:13px;font-weight:700;color:var(--ink)}
.closed-card .cd-n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--maroon);margin-top:3px;font-weight:600}
/* named zero-day AWC list */
.zero-wrap{background:linear-gradient(135deg,#3a0f0f,#5c1717);border-radius:16px;padding:20px 20px 22px;margin:20px 0;color:#fff;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.zero-wrap::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.04)}
.zero-head{display:flex;align-items:center;gap:13px;margin-bottom:6px;position:relative;z-index:2}
.zero-head .big{font-family:'Fraunces',serif;font-weight:600;font-size:44px;line-height:1;color:#ffb4b4}
.zero-head .ht{font-size:13px;line-height:1.4}
.zero-head .ht b{display:block;font-size:16px;font-weight:700}
.zero-sub{font-size:12.5px;color:rgba(255,255,255,.8);margin:8px 0 16px;position:relative;z-index:2}
.zero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;position:relative;z-index:2}
@media(max-width:480px){.zero-grid{grid-template-columns:1fr}}
.zaw{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:11px;padding:12px 14px;display:flex;gap:11px;align-items:flex-start}
.zaw .num{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#ffb4b4;flex:none;width:20px}
.zaw .znm{font-size:14px;font-weight:700;line-height:1.2}
.zaw .zloc{font-size:11px;color:rgba(255,255,255,.72);margin-top:4px;line-height:1.4}
.zaw .zcd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);margin-top:4px}
.zaw .zd{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:rgba(255,180,180,.18);color:#ffc9c9;padding:2px 7px;border-radius:5px;margin-top:6px}
/* day explorer */
.dayexp{margin:18px 0}
.daybtns{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0 16px}
.daybtn{border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:9px 12px;cursor:pointer;font-family:'Inter';font-weight:600;font-size:12.5px;color:var(--ink-soft);transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:54px}
.daybtn:hover{border-color:var(--maroon);transform:translateY(-1px)}
.daybtn.on{background:linear-gradient(135deg,#9e2b2b,#7a1f1f);color:#fff;border-color:transparent}
.daybtn .dn{font-family:'Fraunces',serif;font-size:17px;line-height:1}
.daybtn .dc{font-family:'IBM Plex Mono',monospace;font-size:10px;opacity:.7}
.daybtn.on .dc{opacity:.9}
.daylist{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
@media(max-width:480px){.daylist{grid-template-columns:1fr}}
.dcard{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--maroon);border-radius:11px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.dcard .num{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;color:var(--maroon);flex:none;width:20px}
.dcard .znm{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.2}
.dcard .zloc{font-size:11px;color:var(--ink-soft);margin-top:3px;line-height:1.4}
.dcard .zcd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);margin-top:3px}

footer{border-top:1px solid var(--line);background:var(--paper-2);padding:22px 0 30px;font-size:12px;color:var(--ink-faint);text-align:center}
footer b{color:var(--ink-soft)}

.printbtn{position:fixed;right:16px;bottom:16px;z-index:60;background:var(--teal-deep);color:#fff;border:none;border-radius:100px;padding:11px 18px;font-family:'Inter';font-size:12.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow-lg);display:inline-flex;align-items:center;gap:7px}
@media print{nav.tabs,.printbtn{display:none}.panel{display:block!important;page-break-after:always}header.mast{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header class="mast">

function rows(cat){const d=DATA[cat.src];return DISTRICTS.filter(x=>d[x]).map(x=>({name:x,...d[x]})).sort((a,b)=>b.pct-a.pct);}
function st(cat){return DATA[cat.src].Total;}

function composite(){
  const p={};DISTRICTS.forEach(x=>p[x]={s:0,n:0});
  RANKED.forEach(cat=>rows(cat).forEach((r,i)=>{if(p[r.name]){p[r.name].s+=i+1;p[r.name].n++;}}));
  return DISTRICTS.map(x=>({name:x,avg:p[x].n?p[x].s/p[x].n:99,n:p[x].n}))
    .sort((a,b)=>a.avg-b.avg).map((x,i)=>({...x,rank:i+1}));
}

function leaderboard(cat){
  const r=rows(cat),max=Math.max(...r.map(x=>x.pct),1);let h='<div class="rank-list">';
  r.forEach((row,i)=>{const k=i===0?"top":(i===r.length-1?"bottom":"");
    h+=`<div class="rank-row ${k}"><div class="pos">${String(i+1).padStart(2,'0')}</div>
      <div class="nm"><span class="label">${row.name}</span><span class="barwrap"><span class="bar" data-w="${(row.pct/max*100).toFixed(1)}%"></span></span></div>
      <div class="val">${pf(row.pct)}</div></div>`;});
  return h+'</div>';
}
function table(cat){
  const r=rows(cat),s=st(cat);
  let head=`<th>District</th>`+cat.cols.map((c,i)=>`<th onclick="sortT(this,${i+1})">${c[0]}</th>`).join('');
  let body=r.map(row=>{let t=`<td>${row.name}</td>`;
    cat.cols.forEach(c=>{const v=row[c[1]];
      if(c[1]==="pct"){const k=cls(v,cat.hi,cat.lo);t+=`<td><span class="pin" style="background:${colOf(k)}"></span><span class="${k}">${pf(v)}</span></td>`;}
      else t+=`<td>${fmt(v)}</td>`;});
    return `<tr>${t}</tr>`;}).join('');
  let tr=`<td>Kerala (State)</td>`+cat.cols.map(c=>`<td>${c[1]==="pct"?pf(s.pct):fmt(s[c[1]])}</td>`).join('');
  body+=`<tr class="tot">${tr}</tr>`;
  return `<div class="tablewrap"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}
function insights(cat){
  const r=rows(cat),s=st(cat),best=r[0],worst=r[r.length-1];
  const above=r.filter(x=>x.pct>=s.pct).length,gap=(best.pct-worst.pct).toFixed(1);
  return `<div class="insights">
    <div class="ins good"><div class="it">Top performer</div><div class="ib"><b>${best.name}</b> leads at <b>${pf(best.pct)}</b>.</div></div>
    <div class="ins bad"><div class="it">Needs attention</div><div class="ib"><b>${worst.name}</b> lowest at <b>${pf(worst.pct)}</b> \u2014 ${gap} pt spread.</div></div>
    <div class="ins"><div class="it">State average</div><div class="ib">Kerala at <b>${pf(s.pct)}</b>; <b>${above}</b>/${r.length} districts at or above.</div></div></div>`;
}

/* AWC closed/critical detail */
function awcClosed(){
  const a=DATA.awc;const list=[];
  DISTRICTS.forEach(x=>{const b=a[x].buckets;const zero=b[0],crit=b.slice(0,6).reduce((s,v)=>s+v,0);
    if(crit>0)list.push({name:x,zero,crit});});
  list.sort((p,q)=>q.crit-p.crit);
  const totZero=a.Total.buckets[0],totCrit=a.Total.buckets.slice(0,6).reduce((s,v)=>s+v,0);
  let cards=list.map(d=>`<div class="closed-card"><div class="cd-d">${d.name}</div><div class="cd-n">${d.crit} AWC open \u22645 days${d.zero?` \u00b7 ${d.zero} never opened`:''}</div></div>`).join('');
  return `<div class="alert"><div class="at">\u26a0 Anganwadi Centres needing attention</div>
    <div class="ab">Across Kerala, <b>${totZero} AWCs did not open even one day</b> this month, and <b>${totCrit} AWCs</b> were open 5 days or fewer out of 17. These centres, district-wise, need immediate follow-up.</div>
    <div class="closed-grid">${cards}</div></div>`;
}

function awcDist(){
  const t=DATA.awc.Total.buckets,H=170,lowMax=Math.max(...t.slice(0,17),1);
  const px=v=>Math.max(Math.round(Math.sqrt(v)/Math.sqrt(lowMax)*H),3);
  let bars=t.map((v,i)=>{const full=i===17,hpx=full?190:px(v);
    const col=full?"var(--green)":(i<=5?"var(--maroon)":(i<=12?"var(--amber)":"var(--teal)"));
    return `<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px;min-width:0">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:${full?'var(--green)':'var(--ink-faint)'};font-weight:${full?600:400};white-space:nowrap">${v>0?fmt(v):''}</div>
      <div title="${i} day open: ${fmt(v)}" style="width:75%;max-width:24px;height:${hpx}px;background:${col};border-radius:3px 3px 0 0"></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-soft);font-weight:${full?700:400}">${i}</div></div>`;}).join('');
  return `<div class="card pad" style="margin-top:20px"><div class="card-h">Days AWCs stayed open \u2014 statewide<span class="meta">\u221a-scaled \u00b7 17 = full month</span></div>
    <div class="card-sub">Count of AWCs by number of days open (0\u201317). Smaller bars use a square-root scale to stay visible.</div>
    <div style="display:flex;align-items:flex-end;gap:4px;min-height:235px;padding-top:18px;border-bottom:1px solid var(--line);overflow-x:auto">${bars}</div>
    <div class="legend"><span><i style="background:var(--maroon)"></i>0\u20135 days</span><span><i style="background:var(--amber)"></i>6\u201312</span><span><i style="background:var(--teal)"></i>13\u201316</span><span><i style="background:var(--green)"></i>17 (full)</span></div></div>`;
}

/* HOME PANEL */
function homePanel(){
  const comp=composite();
  // 8 component summary cards
  const cards=RANKED.map(cat=>{
    const s=st(cat),r=rows(cat),best=r[0],worst=r[r.length-1];
    const k=cls(s.pct,cat.hi,cat.lo);
    return `<div class="comp c-${cat.c}" onclick="go('${cat.id}')">
      <div class="ch"><div class="cn">${cat.full}</div><div class="cpct" style="color:${colOf(k)}">${s.pct.toFixed(1)}%</div></div>
      <div class="cd">${cat.pl} \u00b7 state average</div>
      <div class="cbar"><i style="width:${Math.min(s.pct/Math.max(...r.map(x=>x.pct))*100,100).toFixed(0)}%;background:${colOf(k)}"></i></div>
      <div class="crow"><span>Best: <b>${best.name} ${best.pct.toFixed(0)}%</b></span><span>Lowest: <span class="lo">${worst.name} ${worst.pct.toFixed(0)}%</span></span></div>
      <div class="gohint">View district analysis \u2192</div></div>`;
  }).join('');

  const pod=["1st","2nd","3rd"].map((m,i)=>{const x=comp[i];
    return `<div class="pod g${i+1}"><div class="medal">${m} \u00b7 Best overall</div><div class="dist serif">${x.name}</div>
      <div class="score">Top-${x.rank} in most categories \u00b7 avg. position ${x.avg.toFixed(1)} of 14</div></div>`;}).join('');

  const cmax=14,best=comp[0].avg,worst=comp[comp.length-1].avg,span=(worst-best)||1;
  const compHTML='<div class="rank-list">'+comp.map((x,i)=>{const k=i===0?"top":(i===comp.length-1?"bottom":"");
    const w=18+(1-(x.avg-best)/span)*82;
    return `<div class="rank-row ${k}"><div class="pos">${String(i+1).padStart(2,'0')}</div>
      <div class="nm"><span class="label">${x.name}</span><span class="barwrap"><span class="bar" data-w="${w.toFixed(0)}%"></span></span></div>
      <div class="val">#${x.avg.toFixed(1)}</div></div>`;}).join('')+'</div>';

  const awc=DATA.awc.Total,hv=st(CATS.find(c=>c.id==='hv')),ap=st(CATS.find(c=>c.id==='apaar')),thr=st(CATS.find(c=>c.id==='thr'));
  const zero=awc.buckets[0];

  return `<div class="panel active" id="p-home">
    <div class="eyebrow">State Summary \u00b7 All 8 components</div>
    <h2 class="sec serif">Kerala Poshan Tracker at a glance</h2>
    <p class="sec-lead">State-level performance across all eight reporting components, with district-wise drill-downs in each tab above. Anganwadi opening comes first \u2014 it is the foundation for every other service.</p>

    <div class="tiles">
      <div class="tile t-red"><div class="tk">AWCs never opened</div><div class="tv">${zero}</div><div class="ts">centres with 0 days open</div></div>
      <div class="tile t-teal"><div class="tk">AWCs open full month</div><div class="tv">${awc.pct.toFixed(0)}<small>%</small></div><div class="ts">${fmt(awc.full_open)} of ${fmt(awc.total)}</div></div>
      <div class="tile t-green"><div class="tk">Home visits made</div><div class="tv">${hv.pct.toFixed(0)}<small>%</small></div><div class="ts">of ${fmt(hv.targeted)} targeted</div></div>
      <div class="tile t-amber"><div class="tk">APAAR ID coverage</div><div class="tv">${ap.pct.toFixed(0)}<small>%</small></div><div class="ts">lowest-coverage metric</div></div>
    </div>

    ${zeroAWCList()}
    ${dayExplorer()}
    ${awcClosed()}

    <div class="eyebrow" style="margin-top:30px">Component-wise performance</div>
    <h2 class="sec serif" style="font-size:24px">Tap any component to open its district analysis</h2>
    <div class="comp-grid" style="margin-top:16px">${cards}</div>

    <div class="eyebrow" style="margin-top:32px">Overall district ranking</div>
    <h2 class="sec serif" style="font-size:24px">Which districts perform best across all components</h2>
    <p class="sec-lead" style="margin-bottom:14px">Each district's average finishing position across the 8 components (smaller is better \u2014 e.g. <b>#1</b> means it tops most lists).</p>
    ${pod}
    <div class="card pad" style="margin-top:14px">
      <div class="card-h">Full ranking<span class="meta">avg. position across 8 components \u00b7 lower = better</span></div>
      ${compHTML}
      <div class="legend"><span><i style="background:var(--green)"></i>Strongest overall</span><span><i style="background:var(--teal)"></i>Mid</span><span><i style="background:var(--maroon)"></i>Weakest overall</span></div>
    </div>
  </div>`;
}

function catPanel(cat){
  const s=st(cat),tk=cat.cols[0][1];
  return `<div class="panel" id="p-${cat.id}">
    <div class="eyebrow">Component ${RANKED.indexOf(cat)+1>0?'':''}Analysis</div>
    <h2 class="sec serif">${cat.full}</h2>
    <p class="sec-lead">${cat.desc}</p>
    <div class="tiles">
      <div class="tile t-teal"><div class="tk">State coverage</div><div class="tv">${s.pct.toFixed(1)}<small>%</small></div><div class="ts">${cat.pl}</div></div>
      <div class="tile"><div class="tk">${cat.cols[0][0]}</div><div class="tv" style="font-size:23px">${fmt(s[tk])}</div><div class="ts">state total</div></div>
      <div class="tile t-green"><div class="tk">Best district</div><div class="tv" style="font-size:20px">${rows(cat)[0].name}</div><div class="ts">${pf(rows(cat)[0].pct)}</div></div>
      <div class="tile t-red"><div class="tk">Lowest district</div><div class="tv" style="font-size:20px">${rows(cat)[rows(cat).length-1].name}</div><div class="ts">${pf(rows(cat)[rows(cat).length-1].pct)}</div></div>
    </div>
    ${cat.single?'':insights(cat)}
    <div class="split">
      <div class="card pad"><div class="card-h">District ranking<span class="meta">best \u2192 lowest</span></div><div class="card-sub">${cat.pl}</div>${leaderboard(cat)}
        <div class="legend"><span><i style="background:var(--green)"></i>\u2265${cat.hi}%</span><span><i style="background:var(--amber)"></i>${cat.lo}\u2013${cat.hi}%</span><span><i style="background:var(--maroon)"></i>&lt;${cat.lo}%</span></div></div>
      <div class="card pad"><div class="card-h">Detailed figures<span class="meta">tap headers to sort</span></div><div class="card-sub">All reporting districts + state total</div>${table(cat)}</div>
    </div>
    ${cat.id==='awc'?awcDist():''}
  </div>`;
}

/* bootstrap */
const tabbar=document.getElementById('tabbar'),panels=document.getElementById('panels');
const homeTab=document.createElement('button');
homeTab.className='tab active';homeTab.dataset.c='home';homeTab.id='t-home';
homeTab.innerHTML='\u2302 Home';homeTab.onclick=()=>go('home');tabbar.appendChild(homeTab);
CATS.forEach((c,i)=>{const b=document.createElement('button');b.className='tab';b.dataset.c=c.c;b.id='t-'+c.id;
  b.innerHTML=`<span class="tn">${String(i+1).padStart(2,'0')}</span>${c.tab}`;b.onclick=()=>go(c.id);tabbar.appendChild(b);});

panels.innerHTML=homePanel();
CATS.forEach(c=>panels.insertAdjacentHTML('beforeend',catPanel(c)));

function go(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('t-'+id).classList.add('active');
  const p=document.getElementById('p-'+id);p.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});animate(p);
}
function animate(scope){
  const bars=scope.querySelectorAll('.bar, .cbar i');
  bars.forEach(b=>{if(!b.dataset.w)b.dataset.w=b.style.width;b.style.width='0';});
  void scope.offsetWidth;
  requestAnimationFrame(()=>requestAnimationFrame(()=>bars.forEach(b=>b.style.width=b.dataset.w)));
}
function sortT(th,col){
  const tb=th.closest('table').querySelector('tbody'),tot=tb.querySelector('.tot');
  const rs=[...tb.querySelectorAll('tr:not(.tot)')];const asc=th.dataset.a==='1'?false:true;
  th.closest('thead').querySelectorAll('th').forEach(h=>h.dataset.a='');th.dataset.a=asc?'1':'0';
  rs.sort((a,b)=>{let x=parseFloat(a.children[col].innerText.replace(/[^0-9.\-]/g,''))||0,y=parseFloat(b.children[col].innerText.replace(/[^0-9.\-]/g,''))||0;return asc?x-y:y-x;});
  rs.forEach(r=>tb.appendChild(r));if(tot)tb.appendChild(tot);
}
window.addEventListener('load',()=>{showDay(0);animate(document.getElementById('p-home'));});
</script>
